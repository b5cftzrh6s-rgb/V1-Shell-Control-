<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell Control Correlation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background:#0a0a0a; color:#fff; padding:16px; }
        .container { max-width:1400px; margin:auto; }
        .card { background:#111; border-radius:16px; padding:20px; margin-bottom:20px; border:1px solid #222; }
        .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; }
        .metric { background:#1a1a1a; border-radius:12px; padding:14px; text-align:center; }
        .metric-value { font-size:22px; font-weight:700; color:#00d4ff; }
        button { background:#00d4ff; color:#000; border:none; padding:12px 24px; border-radius:9999px; font-weight:600; cursor:pointer; }
        button.secondary { background:#333; color:#fff; }
        select, input { width:100%; padding:10px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:8px; }
        .section-title { color:#00d4ff; font-weight:600; margin:0 0 12px; }
        table { width:100%; border-collapse:collapse; background:#1a1a1a; }
        th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #333; }
        th { background:#222; color:#00d4ff; }
        #status { padding:8px 12px; background:#1a1a1a; border-radius:8px; color:#aaa; font-size:14px; margin-top:8px; display:none; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="background:linear-gradient(90deg,#00d4ff,#00ff9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Shell Control Correlation Tool</h1>
    <p style="color:#888; margin:4px 0 20px;">Definable Shifts • Cup Selection • Sensor Limits Filter • cSt Trend + Std Dev</p>

    <div class="card">
        <h3 class="section-title">📤 Upload Raw Export CSV</h3>
        <input type="file" id="fileInput" accept=".csv" style="width:100%; margin-bottom:16px;">
        <button onclick="runInitialAnalysis()" style="width:100%; margin-top:20px;">🚀 Run Initial Analysis</button>
        <div id="status"></div>
    </div>

<script>
console.log('%c[Shell Control Correlation Tool] Ready with improved error handling.', 'color:#00d4ff');
</script>
</body>
</html>
